<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cross Request 配置</title>
  <style>
    /* 基础样式 */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 500px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f3f4f6;
      color: #1f2937;
      padding: 15px;
    }

    h1 {
      font-size: 18px;
      margin-bottom: 15px;
      color: #111827;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* 通用卡片样式 */
    .card {
      background: white;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #374151;
      border-left: 4px solid #10b981;
      padding-left: 8px;
    }

    /* 输入框组 */
    .input-group {
      display: flex;
      gap: 8px;
    }

    input[type="text"] {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: #10b981; }

    button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }

    .btn-primary { background: #10b981; color: white; }
    .btn-danger { background: #ef4444; color: white; padding: 4px 8px; font-size: 12px; }
    .btn-secondary { background: #3b82f6; color: white; padding: 4px 8px; font-size: 12px; }
    .btn-small { padding: 4px 10px; font-size: 12px; }

    /* 域名卡片样式 (核心修改) */
    .domain-card {
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      margin-bottom: 10px;
      background: #f9fafb;
      overflow: hidden;
    }

    .domain-header {
      background: #fff;
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #f3f4f6;
    }

    .domain-name {
      font-weight: 600;
      font-size: 14px;
      color: #1f2937;
    }

    .domain-body {
      padding: 12px;
    }

    /* Header 标签样式 */
    .header-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
      min-height: 24px; /* 防止空的时候塌陷 */
    }

    .tag {
      background: #e0f2fe;
      color: #0369a1;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tag-remove {
      cursor: pointer;
      font-weight: bold;
      color: #0284c7;
    }
    .tag-remove:hover { color: #dc2626; }

    .empty-tip {
      color: #9ca3af;
      font-size: 12px;
      font-style: italic;
    }

    /* 底部操作栏 */
    .footer-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<h1> Cross Request 配置</h1>

<!-- 域名与 Header 管理区 -->
<div class="card">
  <div class="section-title">域名与 Header 管理</div>

  <!-- 添加新域名 -->
  <div class="input-group" style="margin-bottom: 15px;">
    <input type="text" id="newDomainInput" placeholder="输入域名，如: 101.254.99.156">
    <button id="addDomainBtn" class="btn-primary">添加域名</button>
  </div>

  <!-- 域名列表容器 -->
  <div id="domainListContainer">
    <!-- 动态生成 -->
  </div>
</div>

<!-- 底部操作 -->
<div class="footer-actions">
  <button id="exportBtn" class="btn-secondary">导出配置</button>
  <button id="importBtn" class="btn-secondary">导入配置</button>
  <button id="clearBtn" class="btn-danger">清空所有</button>
  <input type="file" id="fileInput" style="display: none;" accept=".json">
</div>

<script src="popup.js"></script>
</body>
</html>
